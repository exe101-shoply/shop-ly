<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Giỏ hàng - Ly Xinh Shop</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-stone-100 text-stone-800">

  <header class="bg-orange-500 text-white shadow-md">
    <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
      <h1 class="text-2xl font-bold">🛒 Giỏ hàng của bạn</h1>
      <a href="index.html" class="bg-white text-orange-500 px-4 py-2 rounded-xl font-semibold">
        ← Quay lại shop
      </a>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-6 py-8">
    <div id="cart-list" class="space-y-4"></div>

    <div class="mt-8 bg-white rounded-2xl shadow p-6">
      <h2 class="text-xl font-bold mb-3">Tóm tắt đơn hàng</h2>
      <p id="total" class="text-2xl font-bold text-orange-500"></p>
    </div>
  </main>

  <script src="cart.js"></script>
</body>
</html>
