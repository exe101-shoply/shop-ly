<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Ly Xinh Shop</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<!-- 🔥 NAVBAR -->
<div class="bg-orange-500 text-white p-4 flex justify-between items-center">
  <h1 class="text-xl font-bold">🛍️ Ly Xinh Shop</h1>

  <input id="search" placeholder="Tìm ly..."
    class="p-2 rounded text-black w-1/2"
    oninput="renderProducts()" />

  <a href="cart.html" class="bg-white text-orange-500 px-3 py-2 rounded">
    🛒 (<span id="cart-count">0</span>)
  </a>
</div>

<!-- 🎯 BANNER -->
<div class="p-5">
  <div class="bg-white rounded-xl shadow p-5 text-center">
    <h2 class="text-2xl font-bold mb-2">🔥 Sale 50% tất cả ly</h2>
    <p>Trang trí bàn làm việc cực chill ☕</p>
  </div>
</div>

<!-- 🛒 PRODUCT -->
<div id="product-list" class="grid grid-cols-4 gap-4 p-5"></div>

<script src="script.js"></script>
</body>
</html>
